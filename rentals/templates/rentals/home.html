<!-- rentals/templates/rentals/home.html -->
{% extends 'rentals/base.html' %}

{% block content %}
<div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold text-gray-800 underline decoration-blue-500">Welcome to SmartBike Dashboard</h2>
    <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-semibold">New Ride</button>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-green-500">
        <h3 class="text-gray-500 font-semibold uppercase tracking-wider">Available Bikes</h3>
        <p class="text-4xl font-black text-gray-800">12 / 20</p>
        <p class="text-sm text-green-600 mt-2">↑ Good time to ride!</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-500">
        <h3 class="text-gray-500 font-semibold uppercase tracking-wider">Current Weather</h3>
        <p class="text-4xl font-black text-gray-800">18°C</p>
        <p class="text-sm text-blue-600 mt-2">No rain expected in next 3 hours.</p>
    </div>
</div>
{% endblock %}
