<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBike | Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-800 text-white flex flex-col p-6 space-y-6">
        <h1 class="text-2xl font-bold text-blue-400">SmartBike 🚲</h1>
        <nav class="flex-1 space-y-4">
            <a href="{% url 'home' %}" class="...">🏠 Home</a>
            <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg">🚲 Reserve Bike</a>
            <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg">🕒 My Reservations</a>
            <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg">📈 Smart Insights</a>
            <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg">👤 Profile</a>
            <a href="{% url 'login' %}" class="block p-3 text-red-400 hover:bg-slate-700 rounded-lg mt-10">🚪 Logout</a>
        </nav>
        <div class="mt-auto p-4 bg-slate-900 rounded-lg text-sm text-gray-400">
            User: Rukiye (Dev)
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800 underline decoration-blue-500">Welcome to SmartBike Dashboard</h2>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-semibold">New Ride</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-green-500">
                <h3 class="text-gray-500 font-semibold uppercase tracking-wider">Available Bikes</h3>
                <p class="text-4xl font-black text-gray-800">12 / 20</p>
                <p class="text-sm text-green-600 mt-2">↑ Good time to ride!</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-500">
                <h3 class="text-gray-500 font-semibold uppercase tracking-wider">Current Weather</h3>
                <p class="text-4xl font-black text-gray-800">18°C</p>
                <p class="text-sm text-blue-600 mt-2">No rain expected in next 3 hours.</p>
            </div>
        </div>
    </main>

</body>
</html>
