<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SmartBike | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-96">
        <h1 class="text-3xl font-black text-center text-slate-800 mb-2">Join SmartBike 🚲</h1>
        <p class="text-gray-500 text-center mb-8">Create your engineer account</p>
        {% if messages %}
        {% for message in messages %}
        <div class="bg-amber-100 text-amber-700 p-3 rounded-lg mb-4 text-sm font-bold border border-amber-200">
            ⚠️ {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-700">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                Create Account
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Log
                In</a>
        </p>
    </div>
</body>

</html>
