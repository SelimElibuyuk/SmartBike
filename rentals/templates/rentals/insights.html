{% extends 'rentals/base.html' %}

{% block content %}
<div class="space-y-6">
    <h2 class="text-3xl font-bold text-gray-800">📈 Smart Insights</h2>
    <p class="text-gray-600">City-wide bike demand analysis based on 2025 dataset.</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-500">
            <h3 class="text-sm font-semibold text-gray-500 uppercase">Average Demand</h3>
            <p class="text-3xl font-bold text-gray-800 mt-2">{{ avg_demand }} bikes/hr</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-purple-500">
            <h3 class="text-sm font-semibold text-gray-500 uppercase">Peak Demand</h3>
            <p class="text-3xl font-bold text-gray-800 mt-2">{{ max_demand }} bikes</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-orange-500">
            <h3 class="text-sm font-semibold text-gray-500 uppercase">Avg Temperature</h3>
            <p class="text-3xl font-bold text-gray-800 mt-2">{{ avg_temp }}°C</p>
        </div>
    </div>
</div>
{% endblock %}
