{% extends 'rentals/base.html' %}

{% block content %}
{% load i18n %}
<div class="max-w-2xl bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
    <h2 class="text-3xl font-extrabold text-gray-800 mb-6 border-b pb-4">👤 {% trans "Update Profile" %}</h2>
    
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="flex flex-col">
                <label class="text-sm font-semibold text-gray-600 mb-1">{{ field.label }}</label>
                <div class="p-2 border rounded-lg bg-gray-50 focus-within:border-blue-500 transition">
                    {{ field }}
                </div>
                {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <div class="pt-4 flex space-x-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition duration-200 shadow-md">
                💾 {% trans "Save Changes" %}
            </button>
            <a href="{% url 'home' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-8 rounded-xl transition duration-200">
                {% trans "Cancel" %}
            </a>
        </div>
    </form>
</div>
{% endblock %}
